<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Scanner — Jump Contact</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:#0a0e1a;color:#e2e8f0;min-height:100vh;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(62,165,195,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(62,165,195,.03) 1px,transparent 1px);
    background-size:50px 50px;z-index:0;pointer-events:none;
  }
  .container{max-width:1100px;margin:0 auto;padding:24px 16px;position:relative;z-index:1}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;color:#fff}
  h1 span{color:#3ea5c3}
  .subtitle{color:#8b92a8;font-size:.85rem;margin-bottom:20px}
  .search-box{display:flex;gap:8px;margin-bottom:16px}
  #query{
    flex:1;padding:12px 16px;border-radius:8px;border:1px solid rgba(62,165,195,.25);
    background:#141824;color:#fff;font-size:1rem;outline:none;
    transition:border-color .2s;
  }
  #query:focus{border-color:#3ea5c3}
  #query::placeholder{color:#555d70}
  #searchBtn{
    padding:12px 24px;border-radius:8px;border:none;
    background:#bcfd4c;color:#0a0e1a;font-weight:700;font-size:.95rem;
    cursor:pointer;white-space:nowrap;transition:opacity .2s;
  }
  #searchBtn:hover{opacity:.9}
  #searchBtn:disabled{opacity:.5;cursor:wait}
  .interpreted{
    background:#141824;border:1px solid rgba(62,165,195,.15);
    border-radius:6px;padding:10px 14px;margin-bottom:14px;
    font-size:.82rem;color:#8b92a8;display:none;
  }
  .interpreted strong{color:#3ea5c3}
  .count{font-size:.82rem;color:#8b92a8;margin-bottom:8px}
  .count b{color:#3ea5c3}
  .error{color:#f87171;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:.85rem;display:none}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  thead th{
    text-align:left;padding:10px 8px;color:#8b92a8;font-weight:600;
    border-bottom:1px solid rgba(62,165,195,.15);font-size:.78rem;
    text-transform:uppercase;letter-spacing:.04em;
  }
  tbody tr{border-bottom:1px solid rgba(62,165,195,.07);transition:background .15s}
  tbody tr:hover{background:rgba(62,165,195,.04)}
  tbody td{padding:8px;vertical-align:middle}
  .agent{color:#bcfd4c;font-weight:600}
  .client{color:#e2e8f0}
  .dir-in{color:#3ea5c3}.dir-out{color:#e63888}
  .dur{color:#8b92a8;font-variant-numeric:tabular-nums}
  .time{font-variant-numeric:tabular-nums}
  .dl-btn{
    background:transparent;border:1px solid rgba(62,165,195,.3);
    color:#3ea5c3;padding:4px 10px;border-radius:4px;cursor:pointer;
    font-size:.78rem;transition:all .2s;white-space:nowrap;
  }
  .dl-btn:hover{background:rgba(62,165,195,.12);border-color:#3ea5c3}
  .dl-btn.loading{opacity:.5;cursor:wait}
  .dl-all-wrap{display:none;margin-bottom:12px}
  .dl-all{
    padding:8px 20px;border-radius:6px;border:none;
    background:#3ea5c3;color:#fff;font-weight:700;font-size:.85rem;
    cursor:pointer;transition:opacity .2s;
  }
  .dl-all:hover{opacity:.85}
  .dl-all:disabled{opacity:.5;cursor:wait}
  .dl-all-status{color:#8b92a8;font-size:.78rem;margin-left:10px}
  .brand{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em}
  .brand-jc{background:rgba(62,165,195,.15);color:#3ea5c3}
  .brand-msc{background:rgba(230,56,136,.15);color:#e63888}
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .refresh-btn{
    background:transparent;border:1px solid rgba(62,165,195,.3);color:#3ea5c3;
    padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;
    font-weight:600;transition:all .2s;
  }
  .refresh-btn:hover{background:rgba(62,165,195,.12);border-color:#3ea5c3}
  .refresh-btn:disabled{opacity:.5;cursor:wait}
  .refresh-status{color:#8b92a8;font-size:.75rem;margin-right:8px}
  .quick-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .qf{
    padding:6px 14px;border-radius:6px;border:1px solid rgba(62,165,195,.2);
    background:#141824;color:#8b92a8;font-size:.78rem;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .qf:hover{background:rgba(62,165,195,.1);color:#3ea5c3;border-color:rgba(62,165,195,.4)}
  .qf.active{background:rgba(62,165,195,.15);color:#3ea5c3;border-color:#3ea5c3}
  .chip-section{margin-bottom:10px}
  .chip-label{font-size:.72rem;color:#555d70;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
  .chip-row{display:flex;flex-wrap:wrap;gap:4px}
  .chip{
    padding:4px 10px;border-radius:4px;border:1px solid rgba(188,253,76,.12);
    background:rgba(188,253,76,.05);color:#bcfd4c;font-size:.72rem;font-weight:600;
    cursor:pointer;transition:all .15s;text-transform:capitalize;
  }
  .chip:hover{background:rgba(188,253,76,.12);border-color:rgba(188,253,76,.3)}
  .chip.active{background:rgba(188,253,76,.2);border-color:#bcfd4c;box-shadow:0 0 6px rgba(188,253,76,.15)}
  .chip-client{border-color:rgba(226,232,240,.12);background:rgba(226,232,240,.03);color:#e2e8f0}
  .chip-client:hover{background:rgba(226,232,240,.08);border-color:rgba(226,232,240,.2)}
  .chip-client.active{background:rgba(226,232,240,.12);border-color:#e2e8f0;box-shadow:0 0 6px rgba(226,232,240,.1)}
  .qf-sep{width:1px;align-self:stretch;background:rgba(62,165,195,.15);margin:0 4px}
  .sel-summary{font-size:.75rem;color:#8b92a8;margin-bottom:8px;display:none}
  .sel-summary span{color:#3ea5c3;font-weight:600}
  .sel-summary .clear-sel{color:#f87171;cursor:pointer;margin-left:8px;text-decoration:underline}
  .empty{text-align:center;padding:40px;color:#555d70}
  .spinner{display:none;text-align:center;padding:30px;color:#8b92a8}
  .spinner.active{display:block}
  @media(max-width:700px){
    .hide-mobile{display:none}
    table{font-size:.78rem}
    #query{font-size:.9rem}
  }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <h1><span>Call</span> Scanner</h1>
      <p class="subtitle">Type a natural language query — e.g. "George Tuesday morning" or "last 5 calls"</p>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="refreshStatus" class="refresh-status"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAgents()">Refresh Agents</button>
    </div>
  </div>

  <div class="search-box">
    <input id="query" type="text" placeholder='Try: "Sara yesterday", "outbound this week", "last 10 calls"' autofocus>
    <button id="searchBtn" onclick="doSearch()">Search</button>
  </div>

  <div class="quick-filters">
    <button class="qf qf-time" data-value="today" onclick="toggleTime('today')">Today</button>
    <button class="qf qf-time" data-value="yesterday" onclick="toggleTime('yesterday')">Yesterday</button>
    <button class="qf qf-time" data-value="this week" onclick="toggleTime('this week')">This Week</button>
    <span class="qf-sep"></span>
    <button class="qf qf-dir" data-value="inbound" onclick="toggleDir('inbound')">Inbound</button>
    <button class="qf qf-dir" data-value="outbound" onclick="toggleDir('outbound')">Outbound</button>
    <span class="qf-sep"></span>
    <button class="qf" onclick="qfLimit('last 10 calls')">Last 10</button>
    <button class="qf" onclick="qfLimit('last 20 calls')">Last 20</button>
  </div>
  <div class="sel-summary" id="selSummary"></div>
  <div class="chip-section" id="agentChips">
    <div class="chip-label">Agents</div>
    <div class="chip-row" id="agentRow"></div>
  </div>
  <div class="chip-section" id="clientChips" style="display:none">
    <div class="chip-label">Clients</div>
    <div class="chip-row" id="clientRow"></div>
  </div>

  <div id="interpreted" class="interpreted"></div>
  <div id="error" class="error"></div>
  <div id="count" class="count"></div>
  <div id="spinner" class="spinner">Searching Twilio...</div>

  <div id="dlAllWrap" class="dl-all-wrap">
    <button class="dl-all" id="dlAllBtn" onclick="downloadAll()">Download All MP3s</button>
    <span id="dlAllStatus" class="dl-all-status"></span>
  </div>
  <div id="results"></div>
</div>

<script>
const $q = document.getElementById('query');
const $btn = document.getElementById('searchBtn');
const $interp = document.getElementById('interpreted');
const $err = document.getElementById('error');
const $count = document.getElementById('count');
const $spin = document.getElementById('spinner');
const $results = document.getElementById('results');
const $dlWrap = document.getElementById('dlAllWrap');
const $dlBtn = document.getElementById('dlAllBtn');
const $dlStatus = document.getElementById('dlAllStatus');
let lastResults = [];

$q.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = $q.value.trim();
  if (!q) return;

  $btn.disabled = true;
  $interp.style.display = 'none';
  $err.style.display = 'none';
  $count.innerHTML = '';
  $results.innerHTML = '';
  $dlWrap.style.display = 'none';
  $dlStatus.textContent = '';
  lastResults = [];
  $spin.classList.add('active');

  try {
    const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await resp.json();

    if (data.error) {
      $err.textContent = data.error;
      $err.style.display = 'block';
      return;
    }

    if (data.interpreted) {
      $interp.innerHTML = '<strong>Interpreted:</strong> ' + esc(data.interpreted);
      $interp.style.display = 'block';
    }

    $count.innerHTML = '<b>' + data.count + '</b> call' + (data.count !== 1 ? 's' : '') + ' found';

    if (!data.results.length) {
      $results.innerHTML = '<div class="empty">No calls matched your query.</div>';
      return;
    }

    let html = '<table><thead><tr>'
      + '<th>Date</th><th>Time</th><th>Agent</th><th>Client</th>'
      + '<th class="hide-mobile">Brand</th>'
      + '<th>Dir</th><th>Duration</th><th class="hide-mobile">From</th>'
      + '<th></th></tr></thead><tbody>';

    for (const r of data.results) {
      const dirCls = r.direction === 'inbound' ? 'dir-in' : 'dir-out';
      const dirLabel = r.direction === 'inbound' ? 'IN' : r.direction === 'outbound' ? 'OUT' : r.direction;
      html += '<tr>'
        + '<td class="time">' + esc(r.date) + '</td>'
        + '<td class="time">' + esc(r.time) + '</td>'
        + '<td class="agent">' + esc(cap(r.agent)) + '</td>'
        + '<td class="client">' + esc(r.client) + '</td>'
        + '<td class="hide-mobile"><span class="brand brand-' + (r.brand || 'jc') + '">' + (r.brand || 'jc').toUpperCase() + '</span></td>'
        + '<td class="' + dirCls + '">' + dirLabel + '</td>'
        + '<td class="dur">' + esc(r.duration) + '</td>'
        + '<td class="hide-mobile" style="color:#8b92a8;font-size:.78rem">' + esc(r.phone_from) + '</td>'
        + '<td>' + dlBtn(r) + '</td>'
        + '</tr>';
    }
    html += '</tbody></table>';
    $results.innerHTML = html;
    lastResults = data.results;
    const withRec = data.results.filter(r => r.call_sid).length;
    if (withRec > 1) {
      $dlBtn.textContent = 'Download All ' + withRec + ' MP3s';
      $dlWrap.style.display = 'block';
    }

  } catch (e) {
    $err.textContent = 'Request failed: ' + e.message;
    $err.style.display = 'block';
  } finally {
    $btn.disabled = false;
    $spin.classList.remove('active');
  }
}

function dlBtn(r) {
  if (!r.call_sid) return '';
  const url = '/api/recording/' + r.call_sid + (r.agent_sid ? '?agent_sid=' + r.agent_sid : '');
  return '<button class="dl-btn" onclick="dlRec(this,\'' + url + '\')">MP3</button>';
}

async function downloadAll() {
  const calls = lastResults.filter(r => r.call_sid).map(r => ({
    call_sid: r.call_sid,
    agent_sid: r.agent_sid || '',
    label: (r.agent || 'unknown') + '_' + r.date + '_' + (r.time || '').replace(':','') + '_' + (r.direction === 'inbound' ? 'in' : 'out')
  }));
  if (!calls.length) return;
  $dlBtn.disabled = true;
  $dlStatus.textContent = 'Fetching ' + calls.length + ' recordings...';
  try {
    const resp = await fetch('/api/download-all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({calls})
    });
    if (!resp.ok) { $dlStatus.textContent = 'Failed: ' + resp.statusText; return; }
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'recordings.zip';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
    $dlStatus.textContent = 'Done!';
  } catch(e) {
    $dlStatus.textContent = 'Error: ' + e.message;
  } finally {
    $dlBtn.disabled = false;
  }
}

function dlRec(btn, url) {
  btn.classList.add('loading');
  btn.textContent = '...';
  const a = document.createElement('a');
  a.href = url;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => { btn.classList.remove('loading'); btn.textContent = 'MP3'; }, 2000);
}

async function refreshAgents() {
  const btn = document.getElementById('refreshBtn');
  const status = document.getElementById('refreshStatus');
  btn.disabled = true;
  status.textContent = 'Scanning...';
  try {
    const resp = await fetch('/api/refresh-agents', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({days: 14})});
    const data = await resp.json();
    if (data.error) { status.textContent = 'Error: ' + data.error; return; }
    status.textContent = data.count + ' agents found';
    setTimeout(() => { status.textContent = ''; }, 5000);
  } catch(e) {
    status.textContent = 'Failed: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

/* ── Composable filter selection ── */
const sel = { agent: '', client: '', time: '', dir: '' };

function buildQuery() {
  const parts = [];
  if (sel.agent) parts.push(sel.agent);
  if (sel.client) parts.push(sel.client);
  if (sel.dir) parts.push(sel.dir);
  if (sel.time) parts.push(sel.time);
  return parts.join(' ');
}

function updateChipStates() {
  document.querySelectorAll('.chip-agent').forEach(b => b.classList.toggle('active', b.dataset.name === sel.agent));
  document.querySelectorAll('.chip-client').forEach(b => b.classList.toggle('active', b.dataset.name === sel.client));
  document.querySelectorAll('.qf-time').forEach(b => b.classList.toggle('active', b.dataset.value === sel.time));
  document.querySelectorAll('.qf-dir').forEach(b => b.classList.toggle('active', b.dataset.value === sel.dir));
  // Selection summary
  const $sum = document.getElementById('selSummary');
  const q = buildQuery();
  if (q) {
    let parts = [];
    if (sel.agent) parts.push('<span>' + esc(cap(sel.agent)) + '</span>');
    if (sel.client) parts.push('<span>' + esc(sel.client) + '</span>');
    if (sel.dir) parts.push('<span>' + sel.dir + '</span>');
    if (sel.time) parts.push('<span>' + sel.time + '</span>');
    $sum.innerHTML = 'Filter: ' + parts.join(' + ') + ' <a class="clear-sel" onclick="clearSel()">clear</a>';
    $sum.style.display = 'block';
  } else {
    $sum.style.display = 'none';
  }
}

function selSearch() {
  const q = buildQuery();
  if (q) { $q.value = q; doSearch(); }
}

function toggleAgent(name) {
  sel.agent = sel.agent === name ? '' : name;
  updateChipStates(); selSearch();
}
function toggleClient(name) {
  sel.client = sel.client === name ? '' : name;
  updateChipStates(); selSearch();
}
function toggleTime(t) {
  sel.time = sel.time === t ? '' : t;
  updateChipStates(); selSearch();
}
function toggleDir(d) {
  sel.dir = sel.dir === d ? '' : d;
  updateChipStates(); selSearch();
}
function qfLimit(query) {
  sel.agent = ''; sel.client = ''; sel.time = ''; sel.dir = '';
  updateChipStates();
  $q.value = query; doSearch();
}
function clearSel() {
  sel.agent = ''; sel.client = ''; sel.time = ''; sel.dir = '';
  updateChipStates();
  $q.value = '';
}

// Clear chip selections when user types manually
$q.addEventListener('input', () => {
  sel.agent = ''; sel.client = ''; sel.time = ''; sel.dir = '';
  updateChipStates();
});

async function loadChips() {
  try {
    const [agResp, clResp] = await Promise.all([
      fetch('/api/agents'), fetch('/api/clients')
    ]);
    const agData = await agResp.json();
    const clData = await clResp.json();
    const agRow = document.getElementById('agentRow');
    if (agData.agents && agData.agents.length) {
      agRow.innerHTML = agData.agents.map(a =>
        '<button class="chip chip-agent" data-name="' + esc(a) + '" onclick="toggleAgent(\'' + esc(a) + '\')">' + esc(cap(a)) + '</button>'
      ).join('');
    }
    const clRow = document.getElementById('clientRow');
    if (clData.clients && clData.clients.length) {
      clRow.innerHTML = clData.clients.map(c => {
        const safe = esc(c).replace(/'/g,"&#39;");
        return '<button class="chip chip-client" data-name="' + esc(c) + '" onclick="toggleClient(\'' + safe + '\')">' + esc(c) + '</button>';
      }).join('');
      document.getElementById('clientChips').style.display = '';
    }
  } catch(e) { /* silent — chips are optional */ }
}
loadChips();

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
</script>
</body>
</html>
